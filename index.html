<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Punto Cero - Scan & Load</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: linear-gradient(135deg, #050510 0%, #0a0a1a 50%, #150a25 100%); color: #fff; min-height: 100vh; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 420px; min-height: 100vh; padding: 15px; display: flex; flex-direction: column; position: relative; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border-left: 1px solid rgba(255, 255, 255, 0.05); border-right: 1px solid rgba(255, 255, 255, 0.05); }
        header { text-align: center; margin-bottom: 15px; position: relative; z-index: 1; }
        h1 { font-size: 26px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: #00f3ff; text-shadow: 0 0 10px rgba(0, 243, 255, 0.5); }
        .subtitle { font-size: 11px; color: #8b8b9e; letter-spacing: 1px; text-transform: uppercase; }
        
        .card { background: rgba(20, 20, 35, 0.6); backdrop-filter: blur(12px); border-radius: 16px; padding: 15px; margin-bottom: 12px; border: 1px solid rgba(255, 255, 255, 0.08); position: relative; z-index: 1; }
        .card-title { font-size: 10px; font-weight: 700; color: #8b8b9e; letter-spacing: 1px; margin-bottom: 8px; display: block; }
        .row { display: flex; gap: 10px; }
        .input-field { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid rgba(0, 243, 255, 0.3); border-radius: 8px; padding: 10px; color: #fff; font-size: 14px; outline: none; }
        .input-field:focus { border-color: #00f3ff; box-shadow: 0 0 8px rgba(0, 243, 255, 0.2); }
        
        .btn { padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 700; border: none; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 0.5px; width: 100%; }
        .btn:disabled { background: rgba(255, 255, 255, 0.05) !important; color: #333 !important; cursor: not-allowed; box-shadow: none !important; }
        .btn-scan { background: transparent; color: #00f3ff; border: 1.5px solid #00f3ff; }
        .btn-scan.active { background: rgba(255, 0, 85, 0.2); color: #ff0055; border-color: #ff0055; }
        .btn-action { background: linear-gradient(45deg, #bc13fe, #ff0055); color: #fff; box-shadow: 0 4px 20px rgba(255, 0, 85, 0.5); font-size: 18px; padding: 18px; margin-top: auto; }
        .btn-small { background: rgba(0, 243, 255, 0.1); color: #00f3ff; border: 1px solid rgba(0, 243, 255, 0.3); padding: 10px; font-size: 11px; width: auto; white-space: nowrap; }
        .btn-dev { background: rgba(100,100,100,0.2); color: #666; border: 1px solid #444; padding: 10px; font-size: 11px; width: auto; cursor: not-allowed; }
        
        .code-display { text-align: center; margin-top: 10px; }
        .code-value { font-size: 24px; font-weight: 800; color: #ff0055; text-shadow: 0 0 8px rgba(255, 0, 85, 0.4); }
        .code-value.active { color: #00f3ff; text-shadow: 0 0 12px rgba(0, 243, 255, 0.6); }

        .camera-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .camera-view.active { display: flex; }
        .camera-box { position: relative; width: 90%; height: 60vh; background: #000; border-radius: 20px; overflow: hidden; border: 2px solid #00f3ff; box-shadow: 0 0 30px rgba(0, 243, 255, 0.3); }
        .camera-box video { width: 100%; height: 100%; object-fit: cover; }
        .scan-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; height: 60%; border: 2px solid rgba(0, 243, 255, 0.8); border-radius: 10px; pointer-events: none; }
        .camera-close { position: absolute; top: 20px; right: 20px; background: #ff0055; color: white; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 24px; cursor: pointer; z-index: 1001; }
        .camera-capture { margin-top: 20px; background: #00f3ff; color: #000; border: none; border-radius: 50%; width: 70px; height: 70px; font-size: 30px; cursor: pointer; box-shadow: 0 0 20px rgba(0, 243, 255, 0.6); }
        
        .log-container { margin-top: 15px; background: #0a0a0a; border: 1px solid #333; border-radius: 8px; padding: 10px; height: 150px; overflow-y: auto; position: relative; z-index: 1; }
        .log-header { font-size: 10px; color: #888; margin-bottom: 5px; border-bottom: 1px solid #222; padding-bottom: 5px; font-family: monospace; display: flex; justify-content: space-between; align-items: center; }
        .btn-copy-log { background: transparent; color: #00f3ff; border: 1px solid #333; padding: 2px 8px; border-radius: 4px; font-size: 9px; cursor: pointer; text-transform: uppercase; }
        .btn-copy-log:active { background: #333; }
        .log-text { font-size: 11px; font-family: 'Courier New', monospace; line-height: 1.4; }
        .log-info { color: #00f3ff; }
        .log-success { color: #00ff00; }
        .log-error { color: #ff0055; }
        
        canvas { display: none; }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Punto Cero</h1>
            <p class="subtitle">Sistema de Carga</p>
        </header>

        <div class="card">
            <span class="card-title">1. CÓDIGO FÁBRICA (EAN)</span>
            <div class="row">
                <input type="text" id="inputEAN" class="input-field" placeholder="Ingresar EAN manualmente...">
                <button class="btn btn-dev">Buscar Web</button>
            </div>
        </div>

        <div class="card">
            <span class="card-title">2. IMPORTAR DESDE URL</span>
            <div class="row">
                <input type="url" id="inputURL" class="input-field" placeholder="Pegar link...">
                <button class="btn btn-dev">Extraer</button>
            </div>
        </div>

        <div class="card">
            <span class="card-title">3. CÓDIGO INTERNO (DRAGON FISH) - OBLIGATORIO</span>
            <button id="btnScan" class="btn btn-scan">Escanear Código Interno</button>
            <div class="code-display">
                <span class="code-value" id="codigoResultado">Ninguno</span>
            </div>
        </div>

        <div class="card">
            <span class="card-title">4. METADATOS (OPCIONAL)</span>
            <input type="text" id="inputMeta" class="input-field" placeholder="Ej: Promo Día del Padre">
        </div>

        <button id="btnCapture" class="btn btn-action" disabled>📸 ABRIR CÁMARA PARA FOTO</button>

        <div class="log-container">
            <div class="log-header">
                <span>> LOG DEL SISTEMA</span>
                <button class="btn-copy-log" onclick="copiarLog()">Copiar Log</button>
            </div>
            <div id="logArea" class="log-text log-info">Sistema iniciado correctamente.</div>
        </div>
    </div>

    <div id="scannerView" class="camera-view">
        <button class="camera-close" onclick="cerrarScanner()">X</button>
        <div class="camera-box">
            <div id="reader"></div>
            <div class="scan-overlay"></div>
        </div>
    </div>

    <div id="photoView" class="camera-view">
        <button class="camera-close" onclick="cerrarFoto()">X</button>
        <div class="camera-box">
            <video id="videoFoto" autoplay playsinline></video>
            <div class="scan-overlay"></div>
        </div>
        <button class="camera-capture" onclick="tomarFoto()">📸</button>
    </div>

    <canvas id="canvas"></canvas>

    <script src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script>
        const API_KEY = 'TU_API_KEY_AQUI';
        const CLIENT_ID = 'TU_CLIENT_ID_AQUI';
        const FOLDER_ID = '1siuX4Rju_6eVwdVsGnl4nCZ6IO4ATrzQ'; 

        let html5QrCode = null;
        let codigoArticulo = '';
        let photoCount = 0;
        let gapiInited = false;
        let videoStreamFoto = null;

        const elemResultado = document.getElementById('codigoResultado');
        const btnScan = document.getElementById('btnScan');
        const btnCapture = document.getElementById('btnCapture');
        const logArea = document.getElementById('logArea');

        function copiarLog() {
            navigator.clipboard.writeText(logArea.innerText).then(() => addLog("Log copiado.", "success"));
        }

        function addLog(message, type = 'info') {
            const time = new Date().toLocaleTimeString();
            logArea.innerHTML += `<br><span class="log-${type}">[${time}] ${message}</span>`;
            logArea.scrollTop = logArea.scrollHeight;
        }

        // --- ESCÁNER ---
        btnScan.addEventListener('click', () => {
            document.getElementById('scannerView').classList.add('active');
            addLog("Abriendo escáner...", "info");
            setTimeout(startScanner, 500);
        });

        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            const config = { 
                fps: 15, 
                qrbox: function(vw, vh) { let s = Math.min(vw, vh) * 0.8; return { width: Math.floor(s), height: Math.floor(s * 0.5) }; },
                formatsToSupport: [Html5QrcodeSupportedFormats.CODE_39, Html5QrcodeSupportedFormats.CODE_128, Html5QrcodeSupportedFormats.EAN_13]
            };
            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
            .then(() => addLog("Escáner activo.", "info"))
            .catch(err => { addLog("ERROR cámara: " + err, "error"); cerrarScanner(); });
        }

        function onScanSuccess(decodedText) {
            codigoArticulo = decodedText.split('/')[0].trim(); 
            elemResultado.innerText = codigoArticulo; elemResultado.classList.add('active');
            btnCapture.disabled = false; addLog(`Código: ${codigoArticulo}`, "success");
            cerrarScanner(); 
        }

        function cerrarScanner() {
            if (html5QrCode) html5QrCode.stop().then(() => { html5QrCode.clear(); document.getElementById('scannerView').classList.remove('active'); }).catch(() => document.getElementById('scannerView').classList.remove('active'));
            else document.getElementById('scannerView').classList.remove('active');
        }

        // --- FOTO ---
        btnCapture.addEventListener('click', async () => {
            if(!codigoArticulo) return addLog("ERROR: Escanee el código primero.", "error");
            document.getElementById('photoView').classList.add('active');
            addLog("Abriendo cámara de foto...", "info");
            try {
                videoStreamFoto = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } });
                document.getElementById('videoFoto').srcObject = videoStreamFoto;
            } catch (err) { addLog("ERROR: No hay cámara.", "error"); cerrarFoto(); }
        });

        function tomarFoto() {
            const video = document.getElementById('videoFoto');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1200; canvas.height = 1200;
            let size = Math.min(video.videoWidth, video.videoHeight);
            ctx.drawImage(video, (video.videoWidth - size)/2, (video.videoHeight - size)/2, size, size, 0, 0, 1200, 1200);

            btnCapture.innerText = "⏳ COMPRIMIENDO...";
            btnCapture.style.background = "linear-gradient(45deg, #555, #333)";

            canvas.toBlob(async (blob) => {
                cerrarFoto();
                addLog(`Imagen lista (${(blob.size/1024).toFixed(2)} KB). Pidiendo URL a Google...`, "info");

                const meta = document.getElementById('inputMeta').value;
                let nombreArchivo = `${codigoArticulo}_${photoCount++}`;
                if(meta) nombreArchivo += `_${meta.replace(/\s+/g, '_')}`;
                nombreArchivo += ".jpg";
                
                try {
                    if(!gapiInited) await waitForGapi();
                    const token = gapi.client.getToken().access_token;
                    
                    // --- PASO 1: PEDIR URL DE SESIÓN USANDO XHR (A prueba de bloqueos) ---
                    const sessionUrl = await new Promise((resolve, reject) => {
                        const xhr = new XMLHttpRequest();
                        xhr.open('POST', 'https://www.googleapis.com/upload/drive/v3/files?uploadType=resumable', true);
                        xhr.setRequestHeader('Authorization', 'Bearer ' + token);
                        xhr.setRequestHeader('Content-Type', 'application/json');
                        xhr.timeout = 15000; // Tiempo límite de 15 segundos nativo
                        
                        xhr.onload = function() {
                            if (xhr.status === 200) {
                                const location = xhr.getResponseHeader('Location');
                                if (location) resolve(location);
                                else reject(new Error("Google no devolvió la cabecera Location."));
                            } else {
                                reject(new Error("Google respondió con error: " + xhr.status));
                            }
                        };
                        
                        xhr.ontimeout = function() {
                            reject(new Error("BLOQUEO DE RED: El navegador no pudo llegar a Google en 15s. ¿Está en HTTP y no en HTTPS?"));
                        };
                        
                        xhr.onerror = function() {
                            reject(new Error("ERROR CORS O RED: El navegador bloqueó la conexión directa con Google."));
                        };
                        
                        xhr.send(JSON.stringify({ name: nombreArchivo, parents: [FOLDER_ID] }));
                    });

                    addLog("URL obtenida. Subiendo bytes...", "info");
                    btnCapture.innerText = "⏳ SUBIENDO... 0%";

                    // --- PASO 2: SUBIR LA FOTO USANDO XHR ---
                    await new Promise((resolve, reject) => {
                        const xhr2 = new XMLHttpRequest();
                        xhr2.open('PUT', sessionUrl, true);
                        xhr2.setRequestHeader('Content-Type', 'image/jpeg'); 

                        xhr2.upload.onprogress = (e) => {
                            if (e.lengthComputable) {
                                const percent = Math.round((e.loaded / e.total) * 100);
                                btnCapture.innerText = `⏳ SUBIENDO... ${percent}%`;
                                if(percent % 25 === 0) addLog(`Progreso: ${percent}%`, "info");
                            }
                        };

                        xhr2.onload = () => {
                            if (xhr2.status === 200 || xhr2.status === 201) resolve();
                            else reject(new Error(`Error al subir bytes: ${xhr2.status}`));
                        };

                        xhr2.ontimeout = function() { reject(new Error("La subida se cortó por tiempo de espera.")); };
                        xhr2.onerror = function() { reject(new Error("Error de red fuerte al subir la foto.")); };
                        
                        xhr2.send(blob); 
                    });

                    addLog(`¡ÉXITO TOTAL! ${nombreArchivo} subido.`, "success");
                    resetearEstadoApp();
                    
                } catch (e) {
                    addLog(`ERROR FATAL: ${e.message}`, "error");
                    resetearBotonPrincipal();
                }
            }, 'image/jpeg', 0.7);
        }

        function cerrarFoto() {
            if (videoStreamFoto) { videoStreamFoto.getTracks().forEach(track => track.stop()); videoStreamFoto = null; }
            document.getElementById('photoView').classList.remove('active');
        }

        function resetearBotonPrincipal() {
            btnCapture.innerText = "📸 ABRIR CÁMARA PARA FOTO";
            btnCapture.style.background = "linear-gradient(45deg, #bc13fe, #ff0055)";
            btnCapture.disabled = false;
        }

        function resetearEstadoApp() {
            resetearBotonPrincipal();
            elemResultado.innerText = "Ninguno"; elemResultado.classList.remove('active');
            codigoArticulo = ''; btnCapture.disabled = true;
            document.getElementById('inputMeta').value = '';
        }

        // --- GOOGLE DRIVE API ---
        function gapiLoaded() { gapi.load('client', initializeGapiClient); }
        async function initializeGapiClient() {
            try {
                await gapi.client.init({ apiKey: API_KEY, clientId: CLIENT_ID, discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"], scope: 'https://www.googleapis.com/auth/drive.file' });
                gapiInited = true;
                addLog("API de Drive lista.", "success");
            } catch (e) { addLog("ERROR FATAL: Google no conectó.", "error"); }
        }
        
        function waitForGapi() { return new Promise(resolve => { let i = setInterval(() => { if (gapiInited) { clearInterval(i); resolve(); } }, 100); }); }
    </script>
</body>
</html>
