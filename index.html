<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Punto Cero - Scan & Load</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    
    <!-- ========================================================== -->
    <!-- INICIO DEL DISEÑO FUTURISTA (CSS) - Todo el color negro,   -->
    <!-- letras de neón cyan y botones rosas están en estas líneas   -->
    <!-- ========================================================== -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: linear-gradient(135deg, #050510 0%, #0a0a1a 50%, #150a25 100%); color: #fff; min-height: 100vh; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 420px; min-height: 100vh; padding: 20px; display: flex; flex-direction: column; position: relative; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border-left: 1px solid rgba(255, 255, 255, 0.05); border-right: 1px solid rgba(255, 255, 255, 0.05); }
        header { text-align: center; margin-bottom: 20px; position: relative; z-index: 1; }
        h1 { font-size: 28px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: #00f3ff; text-shadow: 0 0 10px rgba(0, 243, 255, 0.5); }
        .subtitle { font-size: 11px; color: #8b8b9e; letter-spacing: 1px; text-transform: uppercase; }
        .card { background: rgba(20, 20, 35, 0.6); backdrop-filter: blur(12px); border-radius: 16px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255, 255, 255, 0.08); position: relative; z-index: 1; }
        .card-title { font-size: 10px; font-weight: 700; color: #8b8b9e; letter-spacing: 1px; margin-bottom: 10px; display: block; }
        .row { display: flex; gap: 10px; }
        .input-field { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid rgba(0, 243, 255, 0.3); border-radius: 8px; padding: 10px; color: #fff; font-size: 14px; outline: none; }
        .input-field:focus { border-color: #00f3ff; box-shadow: 0 0 8px rgba(0, 243, 255, 0.2); }
        .btn { padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 700; border: none; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 0.5px; width: 100%; }
        .btn:disabled { background: rgba(255, 255, 255, 0.05) !important; color: #333 !important; cursor: not-allowed; box-shadow: none !important; }
        .btn-scan { background: transparent; color: #00f3ff; border: 1.5px solid #00f3ff; margin-bottom: 10px; }
        .btn-scan.active { background: rgba(255, 0, 85, 0.2); color: #ff0055; border-color: #ff0055; }
        .btn-action { background: linear-gradient(45deg, #bc13fe, #ff0055); color: #fff; box-shadow: 0 4px 20px rgba(255, 0, 85, 0.5); font-size: 18px; padding: 20px; margin-top: auto; }
        .btn-small { background: rgba(0, 243, 255, 0.1); color: #00f3ff; border: 1px solid rgba(0, 243, 255, 0.3); padding: 10px; font-size: 11px; width: auto; white-space: nowrap; }
        .scanner-box { position: relative; width: 100%; height: 220px; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 15px; border: 1px solid rgba(0, 243, 255, 0.2); display: none; z-index: 1; }
        .scanner-box.active { display: block; }
        #reader { width: 100%; height: 100%; }
        #reader video { object-fit: cover !important; }
        .scan-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; height: 60%; border: 2px solid rgba(0, 243, 255, 0.6); border-radius: 10px; pointer-events: none; box-shadow: 0 0 0 4000px rgba(5, 5, 16, 0.75); }
        .code-display { text-align: center; margin-bottom: 15px; }
        .code-label { font-size: 10px; color: #8b8b9e; letter-spacing: 1px; }
        .code-value { font-size: 22px; font-weight: 800; color: #ff0055; text-shadow: 0 0 8px rgba(255, 0, 85, 0.4); }
        .code-value.active { color: #00f3ff; text-shadow: 0 0 12px rgba(0, 243, 255, 0.6); }
        .switch-container { display: flex; justify-content: space-between; align-items: center; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #00f3ff; box-shadow: 0 0 8px rgba(0, 243, 255, 0.5); }
        input:checked + .slider:before { transform: translateX(20px); }
        .log-area { font-size: 10px; color: #00f3ff; text-align: center; margin-top: 15px; font-family: 'Courier New', monospace; z-index: 1; position: relative; min-height: 30px; }
        canvas { display: none; }
    </style>
    <!-- FIN DEL DISEÑO FUTURISTA -->

</head>
<body>
    <div class="app-container">
        <header>
            <h1>Punto Cero</h1>
            <p class="subtitle">Sistema Inteligente de Carga</p>
        </header>

        <!-- ========================================================== -->
        <!-- INICIO DE LOS INPUTS (EAN, URL, METADATOS, REEL)           -->
        <!-- ========================================================== -->
        <div class="card">
            <span class="card-title">1. CÓDIGO FÁBRICA (EAN) - AUTO BÚSQUEDA</span>
            <div class="row">
                <input type="text" id="inputEAN" class="input-field" placeholder="Escanear o escribir EAN...">
                <button class="btn btn-small" onclick="buscarFotoPorEAN()">Buscar Web</button>
            </div>
        </div>

        <div class="card">
            <span class="card-title">2. IMPORTAR DESDE URL FÁBRICA</span>
            <div class="row">
                <input type="url" id="inputURL" class="input-field" placeholder="Pegar link de la foto...">
                <button class="btn btn-small" onclick="extraerFotoDeURL()">Extraer</button>
            </div>
        </div>

        <div class="card">
            <span class="card-title">3. CÓDIGO INTERNO (DRAGON FISH)</span>
            <button id="btnScan" class="btn btn-scan">Escanear Código de Barras</button>
            <div class="scanner-box" id="scannerBox">
                <div id="reader"></div>
                <div class="scan-overlay"></div>
            </div>
            <div class="code-display">
                <span class="code-label">ARTÍCULO:</span>
                <span id="codigoResultado" class="code-value">Ninguno</span>
            </div>
        </div>

        <div class="card">
            <span class="card-title">4. METADATOS IA (EJ: PROMO DÍA DEL PADRE)</span>
            <input type="text" id="inputMeta" class="input-field" placeholder="Dejar vacío si no aplica...">
        </div>

        <div class="card">
            <div class="switch-container">
                <span class="card-title" style="margin:0;">Generar Reel (Video Corto)</span>
                <label class="switch">
                    <input type="checkbox" id="switchReel">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        <!-- FIN DE LOS INPUTS -->

        <button id="btnCapture" class="btn btn-action" disabled>📸 TOMAR FOTO Y SUBIR A DRIVE</button>

        <div id="logStatus" class="log-area">Listo para operar.</div>
        <canvas id="canvas"></canvas>
    </div>

    <script src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    
    <!-- ========================================================== -->
    <!-- INICIO DE LA LÓGICA (JAVASCRIPT)                           -->
    <!-- Acá está el escáner Code 39, la cámara, el recorte, la     -->
    <!-- compresión a 1200x1200 y la subida a Google Drive.          -->
    <!-- ========================================================== -->
    <script>
        const API_KEY = 'TU_API_KEY_AQUI';
        const CLIENT_ID = 'TU_CLIENT_ID_AQUI';
        const FOLDER_ID = '1siuX4Rju_6eVwdVsGnl4nCZ6IO4ATrzQ'; 

        let html5QrCode = null;
        let codigoArticulo = '';
        let photoCount = 0;
        let isScanning = false;
        let gapiInited = false;

        const elemResultado = document.getElementById('codigoResultado');
        const btnScan = document.getElementById('btnScan');
        const btnCapture = document.getElementById('btnCapture');
        const logStatus = document.getElementById('logStatus');
        const scannerBox = document.getElementById('scannerBox');

        // --- LÓGICA DEL ESCÁNER ---
        btnScan.addEventListener('click', () => {
            if (isScanning) { stopScanner(); } 
            else { scannerBox.classList.add('active'); startScanner(); }
        });

        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            const config = { 
                fps: 10, qrbox: { width: 250, height: 150 }, aspectRatio: 1.0,
                formatsToSupport: [Html5QrcodeSupportedFormats.CODE_39, Html5QrcodeSupportedFormats.CODE_128, Html5QrcodeSupportedFormats.EAN_13, Html5QrcodeSupportedFormats.UPC_A]
            };
            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
            .then(() => { isScanning = true; btnScan.innerText = "Cerrar Cámara"; btnScan.classList.add('active'); })
            .catch(err => { logStatus.innerText = "Error al abrir cámara: " + err; scannerBox.classList.remove('active'); });
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    isScanning = false; scannerBox.classList.remove('active'); btnScan.innerText = "Escanear Código de Barras"; btnScan.classList.remove('active');
                }).catch(err => console.log(err));
            }
        }

        function onScanSuccess(decodedText) {
            codigoArticulo = decodedText.split('/')[0].trim(); 
            elemResultado.innerText = codigoArticulo; elemResultado.classList.add('active');
            btnCapture.disabled = false; logStatus.innerText = "¡Código detectado! Alineá la zapatilla y presioná el botón rosa.";
            setTimeout(() => { btnCapture.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 300);
        }

        // --- LÓGICA PARA TUS FUTURAS CONEXIONES PYTHON ---
        function buscarFotoPorEAN() {
            const ean = document.getElementById('inputEAN').value;
            if(!ean) return alert("Ingrese un código EAN");
            logStatus.innerText = "Buscando foto en base de datos externa (Conectar API Python aquí)...";
        }

        function extraerFotoDeURL() {
            const url = document.getElementById('inputURL').value;
            if(!url) return alert("Pegue una URL válida");
            logStatus.innerText = "Extrayendo imagen de la URL (Conectar Proxy/Python aquí)...";
        }

        // --- LÓGICA DE FOTO Y SUBIDA A DRIVE ---
        btnCapture.addEventListener('click', async () => {
            if(!codigoArticulo) return;
            const video = document.querySelector('#reader video');
            if (!video || !isScanning) { logStatus.innerText = "Error: Cámara cerrada. Volve a escanear."; btnCapture.disabled = true; return; }

            logStatus.innerText = "Procesando imagen (Recortando y comprimiendo)...";
            btnCapture.disabled = true;

            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1200; canvas.height = 1200;
            let size = Math.min(video.videoWidth, video.videoHeight);
            let sx = (video.videoWidth - size) / 2;
            let sy = (video.videoHeight - size) / 2;
            ctx.drawImage(video, sx, sy, size, size, 0, 0, 1200, 1200);

            canvas.toBlob(async (blob) => {
                logStatus.innerText = "Subiendo a Google Drive...";
                const meta = document.getElementById('inputMeta').value;
                const esReel = document.getElementById('switchReel').checked;
                let nombreArchivo = `${codigoArticulo}_${photoCount++}`;
                if(esReel) nombreArchivo += "_REEL"; 
                if(meta) nombreArchivo += `_${meta.replace(/\s+/g, '_')}`; 
                nombreArchivo += ".jpg";

                const file = new File([blob], nombreArchivo, {type: 'image/jpeg'});
                try {
                    if(!gapiInited) await waitForGapi();
                    await gapi.client.request({ path: 'upload/drive/v3/files', method: 'POST', params: { uploadType: 'multipart' }, body: getMultipartBody(file, FOLDER_ID) });
                    stopScanner(); elemResultado.innerText = "Ninguno"; elemResultado.classList.remove('active'); codigoArticulo = '';
                    logStatus.innerText = `¡ÉXITO TOTAL! ${nombreArchivo} subido.`; btnCapture.disabled = true;
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } catch (e) { logStatus.innerText = "Error al subir: " + e.result.error.message; btnCapture.disabled = false; }
            }, 'image/jpeg', 0.7);
        });

        // --- CONEXIÓN GOOGLE DRIVE ---
        function gapiLoaded() { gapi.load('client', initializeGapiClient); }
        async function initializeGapiClient() {
            await gapi.client.init({ apiKey: API_KEY, clientId: CLIENT_ID, discoveryDocs: ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"], scope: 'https://www.googleapis.com/auth/drive.file' });
            gapiInited = true;
        }
        function waitForGapi() { return new Promise(resolve => { let i = setInterval(() => { if (gapiInited) { clearInterval(i); resolve(); } }, 100); }); }
        function getMultipartBody(file, folderId) {
            const boundary = 'foo_bar_baz', delimiter = "\r\n--" + boundary + "\r\n", closeDelim = "\r\n--" + boundary + "--";
            return delimiter + 'Content-Type: application/json\r\n\r\n' + JSON.stringify({ name: file.name, parents: [folderId] }) + delimiter + 'Content-Type: ' + file.type + '\r\n\r\n' + file + closeDelim;
        }
    </script>
    <!-- FIN DE LA LÓGICA -->

</body>
</html>
